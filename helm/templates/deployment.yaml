apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "key-rotation-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "key-rotation-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "key-rotation-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "key-rotation-agent.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart whenever the Secret contents change
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "key-rotation-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: http-echo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          # Use Kubernetes env-var substitution: $(DB_PASSWORD) is expanded
          # by the kubelet before the process starts — no shell needed.
          command: ["/http-echo"]
          args: ["-listen=:5678", "-text=$(DB_PASSWORD)"]
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          # ── secrets exposed as individual env vars ─────────────────
          env:
          {{- if .Values.secretMount.envVars }}
          {{- $secretName := include "key-rotation-agent.secretName" . }}
          {{- range $key := keys .Values.secret.data }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $key }}
          {{- end }}
          {{- end }}
          # ── secret volume mount ────────────────────────────────────
          volumeMounts:
            - name: secret-volume
              mountPath: {{ .Values.secretMount.volumePath }}
              readOnly: true
          livenessProbe:
            httpGet:
              path: {{ .Values.httpEcho.healthPath }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.httpEcho.healthPath }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: secret-volume
          secret:
            secretName: {{ include "key-rotation-agent.secretName" . }}
        - name: tmp
          emptyDir: {}
        - name: certs
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
